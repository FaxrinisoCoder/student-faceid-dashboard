<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; color: #334155; }
        .card { background: white; border: 1px solid #e2e8f0; border-radius: 2rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-10">
        <div class="card p-8 md:p-10">
            <h1 class="text-2xl font-bold text-slate-800 mb-2">Talaba qo'shish</h1>
            <p class="text-slate-500 mb-8 text-sm">Yuzni skanerlash orqali yangi profil yarating</p>

            <div class="relative w-48 h-48 mx-auto mb-8 border-4 border-white shadow-lg rounded-full overflow-hidden bg-slate-100">
                <video id="video" class="w-full h-full object-cover scale-x-[-1]" autoplay muted playsinline></video>
            </div>

            <div class="space-y-4">
                <input type="text" id="name" placeholder="Ism va familiya" 
                    class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-400 outline-none transition-all">
                
                <button onclick="saveStudent()" class="w-full py-4 bg-indigo-500 hover:bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-100">
                    Saqlash
                </button>
                <a href="{% url 'login' %}" class="block text-center text-slate-400 text-sm hover:text-slate-600 transition-colors">Orqaga qaytish</a>
            </div>
            <div id="statusBox" class="mt-6 text-center text-sm text-slate-500 font-medium"></div>
        </div>

        <div class="card p-8">
            <h2 class="text-lg font-bold mb-6 text-slate-700 border-b pb-4">Ro'yxatdagilar</h2>
            <div class="space-y-3 overflow-y-auto max-h-[400px] pr-2">
                {% for student in students %}
                <div class="flex items-center gap-4 p-4 rounded-2xl bg-slate-50 border border-slate-100">
                    <div class="w-10 h-10 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center font-bold">{{ student.name|slice:":1" }}</div>
                    <div>
                        <p class="font-bold text-slate-700 text-sm">{{ student.name }}</p>
                        <p class="text-xs text-slate-400">ID: {{ student.sid }}</p>
                    </div>
                </div>
                {% empty %}
                <p class="text-center text-slate-400 py-10">Hozircha hech kim yo'q</p>
                {% endfor %}
            </div>
        </div>
    </div>
    <canvas id="canvas" width="400" height="300" class="hidden"></canvas>
    </body>
</html>
